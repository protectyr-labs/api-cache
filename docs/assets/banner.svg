<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cacheGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="limiterGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)" rx="6"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
  </g>

  <!-- LEFT SIDE: Title and description -->
  <text x="60" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#cbd5e1">api-cache</text>
  <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64748b">Rate-limited API client with disk caching</text>

  <!-- Status pill -->
  <rect x="60" y="125" width="72" height="24" rx="12" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-width="1" stroke-opacity="0.4"/>
  <text x="96" y="141" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="600">v0.1.0</text>

  <rect x="142" y="125" width="110" height="24" rx="12" fill="#60a5fa" fill-opacity="0.1" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="197" y="141" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="500">Python 3.10+</text>

  <!-- Command hint -->
  <rect x="60" y="165" width="290" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="75" y="183" font-family="monospace, Consolas" font-size="12" fill="#94a3b8">$ pip install api-cache[cache]</text>

  <!-- RIGHT SIDE: Cache + Rate Limiter flow diagram -->

  <!-- Incoming requests (3 arrows from the right edge) -->
  <!-- Request 1 (cache hit) -->
  <g>
    <text x="520" y="50" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="500">REQUESTS</text>

    <!-- Request arrow 1 -->
    <line x1="530" y1="72" x2="680" y2="72" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.6"/>
    <polygon points="678,68 686,72 678,76" fill="#94a3b8" fill-opacity="0.6"/>

    <!-- Request arrow 2 -->
    <line x1="530" y1="110" x2="680" y2="110" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.6"/>
    <polygon points="678,106 686,110 678,114" fill="#94a3b8" fill-opacity="0.6"/>

    <!-- Request arrow 3 -->
    <line x1="530" y1="148" x2="680" y2="148" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.6"/>
    <polygon points="678,144 686,148 678,152" fill="#94a3b8" fill-opacity="0.6"/>
  </g>

  <!-- Cache layer box -->
  <g>
    <rect x="690" y="42" width="130" height="130" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="690" y="42" width="130" height="130" rx="8" fill="url(#cacheGlow)"/>
    <text x="755" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="600">CACHE</text>
    <text x="755" y="82" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">MD5-keyed disk</text>

    <!-- Cache entries (small key-value pairs) -->
    <rect x="704" y="94" width="102" height="18" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="710" y="106" font-family="monospace" font-size="8" fill="#34d399">a3f2..  /posts/1</text>

    <rect x="704" y="116" width="102" height="18" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="710" y="128" font-family="monospace" font-size="8" fill="#34d399">7b1c..  /users/5</text>

    <rect x="704" y="138" width="102" height="18" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="710" y="150" font-family="monospace" font-size="8" fill="#64748b">e9d4..  expired</text>
  </g>

  <!-- Cache HIT: green arrow curving back up from cache -->
  <g>
    <path d="M 755 42 Q 755 22, 640 22 Q 530 22, 530 50" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="526,48 530,56 534,48" fill="#34d399"/>
    <rect x="610" y="12" width="55" height="16" rx="8" fill="#34d399" fill-opacity="0.15"/>
    <text x="637" y="23" font-family="system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle" font-weight="600">HIT</text>
  </g>

  <!-- Cache MISS: arrow continues to rate limiter -->
  <g>
    <line x1="820" y1="110" x2="880" y2="110" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.5"/>
    <polygon points="878,106 886,110 878,114" fill="#94a3b8" fill-opacity="0.5"/>
    <text x="850" y="102" font-family="system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">MISS</text>
  </g>

  <!-- Rate limiter box -->
  <g>
    <rect x="890" y="60" width="120" height="100" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="890" y="60" width="120" height="100" rx="8" fill="url(#limiterGlow)"/>
    <text x="950" y="84" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">THROTTLE</text>
    <text x="950" y="100" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Sliding window</text>

    <!-- Sliding window visualization: small bar chart -->
    <g transform="translate(910, 108)">
      <rect x="0" y="20" width="8" height="15" rx="1" fill="#60a5fa" fill-opacity="0.3"/>
      <rect x="12" y="12" width="8" height="23" rx="1" fill="#60a5fa" fill-opacity="0.4"/>
      <rect x="24" y="16" width="8" height="19" rx="1" fill="#60a5fa" fill-opacity="0.5"/>
      <rect x="36" y="8" width="8" height="27" rx="1" fill="#60a5fa" fill-opacity="0.6"/>
      <rect x="48" y="4" width="8" height="31" rx="1" fill="#60a5fa" fill-opacity="0.8"/>
      <rect x="60" y="0" width="8" height="35" rx="1" fill="#60a5fa"/>
      <!-- Window bracket -->
      <line x1="0" y1="38" x2="68" y2="38" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.4"/>
      <text x="34" y="48" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">28/60</text>
    </g>
  </g>

  <!-- Arrow from rate limiter to upstream API -->
  <g>
    <line x1="1010" y1="110" x2="1060" y2="110" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.5"/>
    <polygon points="1058,106 1066,110 1058,114" fill="#94a3b8" fill-opacity="0.5"/>
  </g>

  <!-- Upstream API -->
  <g>
    <rect x="1070" y="78" width="90" height="64" rx="8" fill="#0f172a" stroke="#64748b" stroke-width="1" stroke-opacity="0.5"/>
    <text x="1115" y="104" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="500">Upstream</text>
    <text x="1115" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="500">API</text>
  </g>

  <!-- Bottom labels -->
  <text x="755" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#34d399" text-anchor="middle" font-weight="500">Cache hit = instant response, zero API calls</text>
  <text x="950" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="500">Miss = throttled, never rate-limited</text>

  <!-- Bottom border accent -->
  <rect x="0" y="216" width="600" height="4" rx="0" fill="#34d399" fill-opacity="0.15"/>
  <rect x="600" y="216" width="600" height="4" rx="0" fill="#60a5fa" fill-opacity="0.15"/>
</svg>